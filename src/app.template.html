<!doctype html>
<html lang="en">

<head>
	<meta charset="utf-8" />
	<link rel="icon" type="image/svg+xml" href="%sveltekit.assets%/favicon.svg" />
	<link rel="icon" type="image/png" sizes="96x96" href="%sveltekit.assets%/favicon-96x96.png" />
	<link rel="shortcut icon" href="%sveltekit.assets%/favicon.ico" />
	<link rel="apple-touch-icon" sizes="180x180" href="%sveltekit.assets%/apple-touch-icon.png" />
	<meta name="apple-mobile-web-app-title" content="{{PUBLIC_BRAND_NAME}}" />
	<meta name="viewport"
		content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no, maximum-scale=1, minimum-scale=1" />
	<link rel="manifest" href="/site.webmanifest">
	<meta name="theme-color" content="#1e1e1e">

	<!-- SEO Meta Tags -->
	<title>{{APP_TITLE}}</title>
	<meta name="description" content="{{APP_DESCRIPTION}}">
	<meta name="keywords" content="AI chat, AI character, character design, Live2D, VRM, status panel, virtual character">
	<meta name="author" content="{{PUBLIC_BRAND_NAME}}">
	<meta name="robots" content="index, follow">
	<meta name="googlebot" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1">
	<link rel="canonical" href="{{PUBLIC_ORIGIN}}">

	<!-- Open Graph / Facebook -->
	<meta property="og:type" content="website">
	<meta property="og:url" content="{{PUBLIC_ORIGIN}}">
	<meta property="og:title" content="{{APP_TITLE}}">
	<meta property="og:description" content="{{APP_DESCRIPTION}}">
	<meta property="og:image" content="{{OG_IMAGE_URL}}">
	<meta property="og:locale" content="en_US">
	<meta property="og:locale:alternate" content="en_US">
	<meta property="og:locale:alternate" content="ko_KR">
	<meta property="og:locale:alternate" content="ja_JP">
	<meta property="og:site_name" content="{{PUBLIC_BRAND_NAME}}">

	<!-- Twitter Card -->
	<meta name="twitter:card" content="summary_large_image">
	<meta name="twitter:url" content="{{PUBLIC_ORIGIN}}">
	<meta name="twitter:title" content="{{APP_TITLE}}">
	<meta name="twitter:description" content="{{APP_DESCRIPTION}}">
	<meta name="twitter:image" content="{{OG_IMAGE_URL}}">

	<!-- Naver Verification (나중에 실제 값으로 교체 필요) -->
	<!-- <meta name="naver-site-verification" content="YOUR_NAVER_VERIFICATION_CODE"> -->

	%sveltekit.head%
</head>

<body data-sveltekit-preload-data="hover">
	<div style="display: contents">%sveltekit.body%</div>
</body>

</html>
